# Release workflow — builds abi3 wheels on tag push and publishes to PyPI.
#
# ONE-TIME PyPI SETUP (OIDC Trusted Publishing, no API token needed):
#   1. Create the project at https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher":
#        Project name:      sctransform-rs
#        Owner:             edumenotti
#        Repository:        sctransform-rs
#        Workflow:          release.yml
#        Environment:       pypi
#   3. In this repo: Settings → Environments → create "pypi" (no secrets required;
#      OIDC handles auth. Optional: add required reviewers for manual approval).
#   4. Push a tag: `git tag v0.1.0 && git push origin v0.1.0` to trigger this workflow.
#
# After first successful publish, the "pending publisher" becomes a live publisher
# bound to the project — no further PyPI-side setup needed for future releases.

name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # upload wheels as GitHub Release assets
  id-token: write   # OIDC for PyPI trusted publishing

jobs:
  linux:
    name: wheels-linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2014"
          args: --release --out dist --interpreter 3.10
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    name: wheels-macos-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: wheels-windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --interpreter 3.10
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
